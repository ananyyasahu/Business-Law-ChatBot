<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jharkhand Startup Policy Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --jhk-forest: #1a4a2e;
    --jhk-gold: #c8860a;
    --jhk-amber: #f5a623;
    --jhk-cream: #fdf6e9;
    --jhk-pale: #f9f3e4;
    --jhk-dark: #0f2a1a;
    --jhk-mid: #2d6b47;
    --jhk-light-green: #e8f5ee;
    --jhk-border: #c9ddd1;
    --user-bubble: #1a4a2e;
    --bot-bubble: #ffffff;
    --shadow: 0 4px 24px rgba(26,74,46,0.10);
    --shadow-lg: 0 8px 40px rgba(26,74,46,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--jhk-cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  .header {
    width: 100%;
    background: var(--jhk-forest);
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 64px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    position: sticky; top: 0; z-index: 100;
  }
  .header-emblem {
    width: 40px; height: 40px;
    background: var(--jhk-gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(200,134,10,0.3);
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header-badge {
    margin-left: auto;
    background: var(--jhk-gold);
    color: var(--jhk-dark);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* MAIN LAYOUT */
  .app-container {
    width: 100%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 0 0 16px 0;
  }

  /* QUICK ACCESS PANEL */
  .quick-panel {
    padding: 16px 20px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: #fff;
    border: 1.5px solid var(--jhk-border);
    color: var(--jhk-forest);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    background: var(--jhk-forest);
    color: #fff;
    border-color: var(--jhk-forest);
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(26,74,46,0.2);
  }

  /* CHAT WINDOW */
  .chat-window {
    flex: 1;
    margin: 16px 20px 0;
    background: #fff;
    border-radius: 16px;
    border: 1.5px solid var(--jhk-border);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 500px;
    max-height: 65vh;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 5px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--jhk-border); border-radius: 10px; }

  /* MESSAGES */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeSlide 0.25s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-avatar.bot { background: var(--jhk-light-green); border: 2px solid var(--jhk-border); }
  .msg-avatar.user { background: var(--jhk-forest); }

  .msg-bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    color: #1a1a1a;
  }
  .msg-row.bot .msg-bubble {
    background: var(--jhk-pale);
    border: 1px solid var(--jhk-border);
    border-top-left-radius: 4px;
  }
  .msg-row.user .msg-bubble {
    background: var(--jhk-forest);
    color: #fff;
    border-top-right-radius: 4px;
  }

  .msg-bubble strong { color: var(--jhk-forest); }
  .msg-row.user .msg-bubble strong { color: var(--jhk-amber); }
  .msg-bubble ul { padding-left: 18px; margin-top: 6px; }
  .msg-bubble li { margin-bottom: 4px; }
  .msg-bubble .highlight {
    background: rgba(200,134,10,0.12);
    border-left: 3px solid var(--jhk-gold);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    margin: 8px 0;
    font-size: 13px;
  }
  .msg-bubble .chip {
    display: inline-block;
    background: var(--jhk-light-green);
    color: var(--jhk-forest);
    border: 1px solid var(--jhk-border);
    border-radius: 12px;
    font-size: 12px;
    padding: 3px 10px;
    margin: 3px 3px 3px 0;
    font-weight: 500;
  }

  /* TYPING INDICATOR */
  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 16px;
    background: var(--jhk-pale);
    border: 1px solid var(--jhk-border);
    border-radius: 16px; border-top-left-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--jhk-mid);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* INPUT AREA */
  .chat-input-area {
    border-top: 1.5px solid var(--jhk-border);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #fff;
  }
  .chat-input {
    flex: 1;
    border: 1.5px solid var(--jhk-border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.18s;
    background: var(--jhk-pale);
    line-height: 1.5;
  }
  .chat-input:focus { border-color: var(--jhk-mid); background: #fff; }
  .chat-input::placeholder { color: #aab6ae; }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--jhk-forest);
    border: none; border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
    color: #fff;
    font-size: 18px;
  }
  .send-btn:hover { background: var(--jhk-mid); transform: scale(1.05); }
  .send-btn:disabled { background: var(--jhk-border); cursor: not-allowed; transform: none; }

  /* STAGE SELECTOR */
  .stage-selector {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;
  }
  .stage-btn {
    background: #fff;
    border: 2px solid var(--jhk-border);
    color: var(--jhk-forest);
    padding: 8px 18px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }
  .stage-btn:hover {
    background: var(--jhk-forest);
    color: #fff;
    border-color: var(--jhk-forest);
  }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 11px;
    color: #9aad9f;
    padding: 10px 20px 0;
    letter-spacing: 0.03em;
  }
  .footer a { color: var(--jhk-mid); text-decoration: none; }

  /* ERROR NOTICE */
  .error-notice {
    background: #fff3cd;
    border: 1px solid #f0c040;
    color: #7a5800;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    margin: 8px 20px 0;
    display: none;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-emblem">🌿</div>
  <div>
    <div class="header-title">Jharkhand Startup Policy Assistant</div>
    <div class="header-sub">Powered by AI · Policy 2023 · Dept. of IT &amp; e-Governance</div>
  </div>
  <div class="header-badge">Live</div>
</div>

<div class="app-container">

  <!-- QUICK ACCESS -->
  <div class="quick-panel">
    <button class="quick-btn" onclick="sendQuick('What benefits are available under the policy?')">📋 Benefits</button>
    <button class="quick-btn" onclick="sendQuick('Who is eligible for the Jharkhand Startup Policy?')">✅ Eligibility</button>
    <button class="quick-btn" onclick="sendQuick('How do I apply for funding?')">💰 Apply for Funding</button>
    <button class="quick-btn" onclick="sendQuick('What incentives are available?')">🎁 Incentives</button>
    <button class="quick-btn" onclick="startStageGuidance()">🚀 Stage-Based Guidance</button>
    <button class="quick-btn" onclick="startEligibilityCheck()">🔍 Check Eligibility</button>
  </div>

  <div class="error-notice" id="errorNotice">
    ⚠️ API key not configured. Please set your Anthropic API key in the chatbot code.
  </div>

  <!-- CHAT WINDOW -->
  <div class="chat-window">
    <div class="chat-messages" id="chatMessages">
      <!-- Welcome message injected by JS -->
    </div>
    <div class="chat-input-area">
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Ask about benefits, eligibility, funding, incentives..."
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div class="footer">
    Based on <strong>Jharkhand Startup Policy 2023</strong> · Dept. of IT &amp; e-Governance, GoJ ·
    Apply at <a href="https://abvil.jharkhand.gov.in" target="_blank">abvil.jharkhand.gov.in</a>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let conversationHistory = [];
let isTyping = false;
let awaitingStage = false;
let awaitingEligibility = false;
let eligibilityData = {};
let eligibilityStep = 0;

const ELIGIBILITY_QUESTIONS = [
  { key: 'location', q: 'Is your startup registered / incorporated in Jharkhand?' },
  { key: 'stage',    q: 'What is your startup stage?\n1. Idea Stage\n2. Prototype Stage\n3. Early Commercialisation\n4. Scale-Up Stage' },
  { key: 'turnover', q: 'What is your current annual turnover?\n1. Less than ₹25 lakh\n2. ₹25 lakh – ₹1 crore\n3. More than ₹1 crore' },
  { key: 'age',      q: 'How long has your startup been incorporated?\n1. Not yet registered\n2. Less than 3 years\n3. 3 – 7 years\n4. More than 7 years' },
  { key: 'founder',  q: 'Which category best describes the primary founder?\n1. General\n2. Female founder\n3. SC/ST founder\n4. Differently-abled founder\n5. Tribal/Rural community' },
];

// ─── SYSTEM PROMPT ───────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are the "Jharkhand Startup Policy Assistant", an expert AI chatbot for entrepreneurs and businessmen in Jharkhand, India. Your purpose is to help users understand and benefit from the Jharkhand Startup Policy 2023.

POLICY KNOWLEDGE BASE:
1. ELIGIBILITY: The startup must be incorporated in Jharkhand (or relocate). It must have annual turnover under ₹25 crore. It must be incorporated for less than 7 years (10 years for biotech). Needs DPIIT recognition or can apply through ABVIL. Cannot be a division of a larger corporation.

2. FINANCIAL BENEFITS:
   - Idea/Ideation Stage: Monthly stipend of ₹15,000 per founder (up to 3 members) for 12 months. Extra ₹2,000/month for women, SC/ST, transgender, differently-abled founders.
   - Prototype Stage: Up to ₹10 lakh financial support for prototype development or initial business setup.
   - Scale-Up Stage: One-time grant up to ₹10 lakh for scaling operations.
   - Student entrepreneurs: Interest reimbursement on student loans up to ₹10 lakh over 3 years.

3. COST INCENTIVES:
   - 100% SGST reimbursement for 5 years.
   - 100% stamp duty and property registration fee reimbursement (first transaction).
   - Lease rental reimbursement: 75% in Year 1, 50% in Year 2, 25% in Years 3–5 (max ₹3 lakh/year).
   - 50% internet bandwidth reimbursement (max ₹60,000/year) for 5 years.
   - 30% electricity bill reimbursement (max ₹60,000/year) for 5 years.
   - Patent filing reimbursement: up to ₹50,000 per patent.
   - Certification costs: up to ₹50,000 (domestic), ₹1.5 lakh (international).
   - Municipal duty reimbursement for 3 years.
   - SC/ST, female, differently-abled founders get additional 5% on lease, bandwidth, and electricity reimbursements.

4. INFRASTRUCTURE:
   - Atal Bihari Vajpayee Innovation Lab (ABVIL): free co-working space, fabrication labs, design labs, IP support, market research, mentorship for up to 2 years.
   - 24 private + 24 public incubators across Jharkhand.
   - Virtual Incubator for rural/remote startups.
   - Single Window Clearance portal.
   - Dedicated startup-only bank branch.

5. APPLICATION PROCESS:
   - Register on the ABVIL portal: https://abvil.jharkhand.gov.in
   - Get DPIIT recognition (via Startup India portal).
   - Apply through Single Window Portal with One Form Policy.
   - Screening Committee reviews applications.
   - State Evaluation Board (SEB) approves funding.
   - Timeline: generally 30–90 days for basic decisions.
   - Documents needed: Incorporation certificate, PAN, Aadhaar of founders, business plan, proof of innovation, turnover certificate.

6. STAGE-BASED GUIDANCE:
   - IDEA STAGE: Focus on stipend, ABVIL membership, incubation, boot camps, curriculum support.
   - PROTOTYPE STAGE: Apply for ₹10 lakh prototype grant, use ABVIL labs, seek mentorship.
   - SCALING STAGE: Apply for scale-up grant, use SGST/stamp duty benefits, explore JEDF co-investment.

7. SPECIAL CATEGORIES:
   - Women entrepreneurs: Extra ₹2,000/month + additional 5% reimbursements + Best Female Entrepreneur award.
   - Tribal/Rural: Special outreach, One District One Product scheme, Best Tribal Startup award.
   - Student startups: Interest-free loan support, Best Student Startup award.
   - SC/ST: Additional benefits in stipends and reimbursements.

8. JHARKHAND ENTREPRENEURSHIP DEVELOPMENT FUND (JEDF): Institutional fund managing all disbursements, managed by multi-stakeholder board.

9. AWARDS: Jharkhand Startup Champion Awards – Best Tribal Startup, Best Female Entrepreneur, Best Rural Startup, Best Student Startup, Best Innovation.

10. CONTACT: Portal – https://abvil.jharkhand.gov.in | Policy Dept: IT & e-Governance, Govt of Jharkhand.

INSTRUCTIONS:
- Be warm, helpful, and practical. Use simple language businesspeople understand.
- Format answers clearly with bold headers, bullet points where useful.
- Always offer next steps or related questions the user might have.
- When uncertain, say so and direct to official portal.
- Keep responses concise (3–6 short paragraphs max).
- Use ₹ symbol for amounts. Mention amounts clearly.
- End complex answers with a practical next step or call to action.`;

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  addBotMessage(`👋 **Namaste! Welcome to the Jharkhand Startup Policy Assistant.**

I can help you navigate the <strong>Jharkhand Startup Policy 2023</strong> — your complete guide to government support, funding, incentives, and how to apply.

Here's what I can help you with:
<ul>
  <li>💰 <strong>Financial benefits</strong> – stipends, grants, and funds</li>
  <li>✅ <strong>Eligibility</strong> – check if your startup qualifies</li>
  <li>🚀 <strong>Stage-based guidance</strong> – tailored advice for your startup stage</li>
  <li>📋 <strong>Application process</strong> – step-by-step how to apply</li>
  <li>🏢 <strong>Infrastructure</strong> – incubation, labs, co-working spaces</li>
</ul>

Use the <strong>quick buttons above</strong> or type your question below. What would you like to know?`);
};

// ─── CHAT FUNCTIONS ──────────────────────────────────────────────────────────
function addBotMessage(html, showTyping = false) {
  const container = document.getElementById('chatMessages');
  if (showTyping) {
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row bot';
    typingRow.id = 'typingIndicator';
    typingRow.innerHTML = `
      <div class="msg-avatar bot">🌿</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    container.appendChild(typingRow);
    container.scrollTop = container.scrollHeight;
    return;
  }
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `
    <div class="msg-avatar bot">🌿</div>
    <div class="msg-bubble">${html}</div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function addUserMessage(text) {
  const container = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-avatar user">👤</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function setInputEnabled(enabled) {
  document.getElementById('chatInput').disabled = !enabled;
  document.getElementById('sendBtn').disabled = !enabled;
}

// ─── STAGE GUIDANCE ───────────────────────────────────────────────────────────
function startStageGuidance() {
  awaitingStage = true;
  addBotMessage(`🚀 <strong>Stage-Based Guidance</strong>

To give you the most relevant advice, please tell me your current startup stage:

<div class="stage-selector">
  <button class="stage-btn" onclick="handleStageSelect('Idea Stage')">💡 Idea Stage</button>
  <button class="stage-btn" onclick="handleStageSelect('Prototype Stage')">🔧 Prototype Stage</button>
  <button class="stage-btn" onclick="handleStageSelect('Scaling Stage')">📈 Scaling Stage</button>
</div>`);
}

function handleStageSelect(stage) {
  awaitingStage = false;
  addUserMessage(stage);
  sendToAI(`I am at the ${stage}. What specific benefits, incentives, and next steps should I focus on under the Jharkhand Startup Policy 2023?`);
}

// ─── ELIGIBILITY CHECKER ─────────────────────────────────────────────────────
function startEligibilityCheck() {
  awaitingEligibility = true;
  eligibilityStep = 0;
  eligibilityData = {};
  addBotMessage(`🔍 <strong>Eligibility Checker</strong>

I'll ask you a few quick questions to find out which benefits you qualify for under the Jharkhand Startup Policy 2023.

<strong>Question 1 of 5:</strong><br>
${ELIGIBILITY_QUESTIONS[0].q}

<div class="stage-selector">
  <button class="stage-btn" onclick="handleEligibilityAnswer('Yes – registered in Jharkhand')">✅ Yes</button>
  <button class="stage-btn" onclick="handleEligibilityAnswer('No – registered elsewhere')">❌ No</button>
  <button class="stage-btn" onclick="handleEligibilityAnswer('Planning to register in Jharkhand')">🔄 Planning to</button>
</div>`);
}

function handleEligibilityAnswer(answer) {
  addUserMessage(answer);
  eligibilityData[ELIGIBILITY_QUESTIONS[eligibilityStep].key] = answer;
  eligibilityStep++;

  if (eligibilityStep < ELIGIBILITY_QUESTIONS.length) {
    const q = ELIGIBILITY_QUESTIONS[eligibilityStep];
    let buttonsHtml = '';
    if (q.key === 'stage') {
      buttonsHtml = `<div class="stage-selector">
        <button class="stage-btn" onclick="handleEligibilityAnswer('Idea Stage')">💡 Idea Stage</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('Prototype Stage')">🔧 Prototype Stage</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('Early Commercialisation')">🛒 Early Commercial</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('Scale-Up Stage')">📈 Scale-Up</button>
      </div>`;
    } else if (q.key === 'turnover') {
      buttonsHtml = `<div class="stage-selector">
        <button class="stage-btn" onclick="handleEligibilityAnswer('Less than ₹25 lakh')">Under ₹25L</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('₹25 lakh to ₹1 crore')">₹25L–₹1Cr</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('More than ₹1 crore but under ₹25 crore')">₹1Cr–₹25Cr</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('More than ₹25 crore')">Over ₹25Cr</button>
      </div>`;
    } else if (q.key === 'age') {
      buttonsHtml = `<div class="stage-selector">
        <button class="stage-btn" onclick="handleEligibilityAnswer('Not yet registered')">Not yet</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('Less than 3 years old')">< 3 yrs</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('3 to 7 years old')">3–7 yrs</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('More than 7 years old')">7+ yrs</button>
      </div>`;
    } else if (q.key === 'founder') {
      buttonsHtml = `<div class="stage-selector">
        <button class="stage-btn" onclick="handleEligibilityAnswer('General founder')">General</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('Female founder')">Female</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('SC/ST founder')">SC/ST</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('Differently-abled founder')">Differently-abled</button>
        <button class="stage-btn" onclick="handleEligibilityAnswer('Tribal or Rural community founder')">Tribal/Rural</button>
      </div>`;
    }
    addBotMessage(`<strong>Question ${eligibilityStep + 1} of ${ELIGIBILITY_QUESTIONS.length}:</strong><br>${q.q.replace(/\n/g,'<br>')}${buttonsHtml}`);
  } else {
    // All questions answered — send to AI for analysis
    const summary = Object.entries(eligibilityData)
      .map(([k, v]) => `${k}: ${v}`).join(', ');
    sendToAI(`Please perform an eligibility check for this startup profile and tell them exactly which benefits they qualify for under the Jharkhand Startup Policy 2023, what they don't qualify for and why, and recommended next steps. Profile: ${summary}`);
    awaitingEligibility = false;
  }
}

// ─── MAIN SEND FLOW ───────────────────────────────────────────────────────────
function sendQuick(text) {
  addUserMessage(text);
  sendToAI(text);
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });
  sendToAI(text, false);
}

async function sendToAI(userMessage, addToHistory = true) {
  if (isTyping) return;
  isTyping = true;
  setInputEnabled(false);
  if (addToHistory) conversationHistory.push({ role: 'user', content: userMessage });
  addBotMessage('', true); // show typing

  try {
    const messages = conversationHistory.length > 0
      ? conversationHistory
      : [{ role: 'user', content: userMessage }];

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      throw new Error(data.error.message || 'API error');
    }

    const rawText = data.content.map(b => b.text || '').join('');
    const formatted = formatResponse(rawText);
    addBotMessage(formatted);
    conversationHistory.push({ role: 'assistant', content: rawText });

  } catch (err) {
    removeTyping();
    // Fallback to built-in FAQ
    const fallback = getFallbackResponse(userMessage);
    addBotMessage(fallback);
    if (err.message && err.message.includes('API')) {
      document.getElementById('errorNotice').style.display = 'block';
    }
  }

  isTyping = false;
  setInputEnabled(true);
  document.getElementById('chatInput').focus();
}

// ─── FORMATTING ───────────────────────────────────────────────────────────────
function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^### (.*)/gm, '<strong style="font-size:15px;color:var(--jhk-forest)">$1</strong>')
    .replace(/^## (.*)/gm,  '<strong style="font-size:16px;color:var(--jhk-forest)">$1</strong>')
    .replace(/^# (.*)/gm,   '<strong style="font-size:17px;color:var(--jhk-forest)">$1</strong>')
    .replace(/^[-•] (.*)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
